<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="仲間内のスポーツ予想リーグをポイント制で管理するアプリ"
    />
    <title>Yoso League</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Private prediction league</p>
          <h1>Yoso League</h1>
        </div>
        <button class="icon-button" id="exportButton" title="データを書き出す" aria-label="データを書き出す">
          ⇩
        </button>
      </header>

      <main class="workspace">
        <section class="league-panel" aria-label="リーグ設定">
          <div class="section-heading">
            <div>
              <h2>リーグ</h2>
              <p>リアルマネー機能なしのポイント管理用です。</p>
            </div>
            <button id="resetButton" class="ghost-button">初期化</button>
          </div>

          <label class="field">
            <span>リーグ名</span>
            <input id="leagueName" type="text" autocomplete="off" />
          </label>

          <div class="field">
            <span>参加者</span>
            <div class="participant-list" id="participantList"></div>
            <div class="inline-form">
              <input id="participantName" type="text" placeholder="名前を追加" autocomplete="off" />
              <button id="addParticipantButton">追加</button>
            </div>
          </div>

          <div class="field">
            <span>ルールプリセット</span>
            <div class="template-grid" id="templateGrid"></div>
          </div>
        </section>

        <section class="event-panel" aria-label="イベント設定">
          <div class="section-heading">
            <div>
              <h2 id="eventTitle">イベント</h2>
              <p id="eventSubtitle">プリセットを選ぶと入力欄が切り替わります。</p>
            </div>
            <button id="newEventButton" class="primary-button">作成</button>
          </div>

          <div class="event-form" id="eventForm"></div>
        </section>

        <section class="score-panel" aria-label="スコアボード">
          <div class="section-heading">
            <div>
              <h2>スコアボード</h2>
              <p>確定結果を入力すると自動で順位を計算します。</p>
            </div>
            <button id="saveButton" class="primary-button">保存</button>
          </div>

          <div class="scoreboard" id="scoreboard"></div>
          <div class="insight-band" id="insightBand"></div>
        </section>
      </main>
    </div>

    <dialog id="exportDialog">
      <form method="dialog">
        <div class="dialog-head">
          <h2>エクスポート</h2>
          <button class="icon-button" value="close" aria-label="閉じる">×</button>
        </div>
        <textarea id="exportText" readonly></textarea>
        <button class="primary-button" value="close">閉じる</button>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
