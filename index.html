<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yoso League</title>
</head>
<body>
  <script>
    (async () => {
      const files = [
        "chunks/app-001.txt",
        "chunks/app-002.txt",
        "chunks/app-003.txt",
        "chunks/app-004.txt",
        "chunks/app-005.txt",
        "chunks/app-006.txt",
        "chunks/app-007.txt",
        "chunks/app-008.txt",
        "chunks/app-009.txt"
      ];
      const encoded = (await Promise.all(files.map((file) => fetch(file).then((response) => response.text())))).join("");
      const html = new TextDecoder().decode(Uint8Array.from(atob(encoded), (char) => char.charCodeAt(0)));
      document.open();
      document.write(html);
      document.close();
    })();
  </script>
</body>
</html>
